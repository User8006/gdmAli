name: Download OSBoxes Image and Upload Artifact

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Create download directory
        run: mkdir -p downloads

      - name: Download file from SourceForge
        run: |
          wget -O downloads/ubuntu-24.04-osboxes.7z \
            "https://sourceforge.net/projects/osboxes/files/v/vm/55-U--u/24.04/64bit.7z/download"

      - name: Verify download
        run: ls -lh downloads

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ubuntu-24.04-osboxes
          path: downloads/ubuntu-24.04-osboxes.7z
