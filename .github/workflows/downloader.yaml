name: Download GGUF Model and Upload Artifact

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Create download directory
        run: mkdir -p downloads

      - name: Download file from Hugging Face
        run: |
          wget -O downloads/Qwen2.5-7B-Instruct-Q6_K.gguf \
            "https://huggingface.co/bartowski/Qwen2.5-7B-Instruct-GGUF/resolve/main/Qwen2.5-7B-Instruct-Q6_K.gguf?download=true"

      - name: Verify download
        run: ls -lh downloads

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qwen2.5-7b-instruct-q6_k-gguf
          path: downloads/Qwen2.5-7B-Instruct-Q6_K.gguf
